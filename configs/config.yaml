# AI Incident Extraction Benchmark Configuration
# Design: 3 PS × 4 KI × 3 Models = 36 experimental runs

# ---------------------------------------------------------------------------
# Models (3 tiers)
# ---------------------------------------------------------------------------
models:
  # Low tier: open-source, local
  - key: "llama3.1:8b"
    provider: ollama
    model_id: "llama3.1:8b"
    label: "Llama 3.1 8B (local, 4-bit)"
    tier: low

  # Mid tier: commercial API
  - key: "claude-haiku-4-5-20251001"
    provider: anthropic
    model_id: "claude-haiku-4-5-20251001"
    label: "Claude Haiku 4.5"
    tier: mid

  # High tier: frontier model
  - key: "claude-opus-4-6"
    provider: anthropic
    model_id: "claude-opus-4-6"
    label: "Claude Opus 4.6"
    tier: high

# ---------------------------------------------------------------------------
# Prompting Strategies (PS)
# ---------------------------------------------------------------------------
prompting_strategies:
  - id: PS1
    label: "Zero-shot"
    description: "Task instruction + KI + article. No examples."
    calls: 1

  - id: PS2
    label: "Few-shot"
    description: "Three worked examples prepended to the prompt."
    calls: 1

  - id: PS3
    label: "Verification (CoVe)"
    description: "Three calls: extract, independently verify each field, revise."
    calls: 3

# ---------------------------------------------------------------------------
# Knowledge Injection (KI)
# ---------------------------------------------------------------------------
knowledge_injection:
  - id: KI1
    label: "No injection"
    description: "Field names and JSON format only."

  - id: KI2
    label: "Schema-guided"
    description: "Field names + data types + enumerated value options."
    sources:
      - "OECD Common Reporting Framework (Perset et al., 2025)"
      - "AIID submission schema (Paeth & McGregor, 2025)"

  - id: KI3
    label: "Taxonomy-guided"
    description: "Schema + hierarchically organized category labels."
    sources:
      - "OECD harm classification (Perset et al., 2025, criterion 11)"
      - "CSET AI Harm Taxonomy (Hoffman & Frase, 2023)"
      - "OECD AI task classification (Perset et al., 2025, criterion 25)"
      - "GMF taxonomy (Pittaras & McGregor, 2022)"

  - id: KI4
    label: "Ontology-guided"
    description: "Taxonomy + explicit relational constraints between entities."
    sources:
      - "gUFO / gOCED ontology (Hooshyar et al., 2025)"
      - "ODKE+ approach (Khorshidi et al., 2025)"

# ---------------------------------------------------------------------------
# Extraction schema (ground truth fields)
# ---------------------------------------------------------------------------
schema:
  event:
    - event_type       # "AI incident" or "AI hazard"
    - event_date       # YYYY-MM-DD or "not stated"
    - event_location   # country/city
    - description      # one-sentence summary

  ai_system:
    - name             # system name if mentioned
    - system_type      # from taxonomy
    - developer        # organization that built it
    - deployer         # organization that deployed it

  harm:
    - harm_type        # from taxonomy
    - severity         # from taxonomy
    - affected_parties # who was harmed

  organizations:       # array of objects
    - name             # organization name
    - role             # developer, deployer, regulator, victim, other

# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - hallucination_rate
    - json_validity_rate
  comparison: field_level
  normalization: case_insensitive

# ---------------------------------------------------------------------------
# Experiment settings
# ---------------------------------------------------------------------------
experiment:
  output_dir: "data/results"
  random_seed: 42
  temperature: 0.0
  max_tokens: 2000
  dataset: "data/raw/experimental_incidents_50.xlsx"
